<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JANテスト</title>

<style>
body{
font-family:sans-serif;
text-align:center;
margin:10px;
}

video{
width:100%;
max-width:500px;
border:2px solid #333;
}

#result{
font-size:30px;
font-weight:bold;
margin-top:20px;
color:blue;
}

.frame{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:280px;
height:120px;
border:4px solid red;
pointer-events:none;
}

.wrap{
position:relative;
display:inline-block;
}
</style>
</head>

<body>

<h2>JAN読取テスト</h2>

<div class="wrap">
<video id="video" autoplay playsinline muted></video>
<div class="frame"></div>
</div>

<br><br>

<button id="startBtn">
カメラ開始
</button>

<div id="result">
未読取
</div>

<script>

const resultEl =
document.getElementById("result");

const video =
document.getElementById("video");

document
.getElementById("startBtn")
.addEventListener(
"click",
startCamera
);

async function startCamera(){

try{

const stream =
await navigator
.mediaDevices
.getUserMedia({
video:{
facingMode:{
ideal:"environment"
}
}
});

video.srcObject =
stream;

startDetect();

}catch(e){

alert(
"カメラ起動失敗\n"+
e.message
);

}

}

async function startDetect(){

if(
!("BarcodeDetector" in window)
){

resultEl.innerText =
"BarcodeDetector未対応";

return;

}

const detector =
new BarcodeDetector({
formats:[
"ean_13"
]
});

setInterval(
async()=>{

try{

const codes =
await detector.detect(
video
);

if(
codes.length
){

const value =
codes[0].rawValue;

resultEl.innerText =
value;

}

}catch(e){

console.log(e);

}

},
500
);

}

</script>

</body>
</html>
